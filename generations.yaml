generations:
  - name: "First Generation"
    start_year: 2013
    end_year: 2016
    description: "The original Chevrolet Trax was a subcompact crossover SUV built on GM's Gamma II platform shared with the Buick Encore. Introduced in global markets in 2013 and arriving in the U.S. for the 2015 model year, it featured a tall, boxy design that maximized interior space within a small footprint. Powered by a 1.4L turbocharged four-cylinder engine producing 138 HP, paired with a six-speed automatic transmission. Available in front-wheel or all-wheel drive configurations, it focused on urban usability with city-friendly dimensions and good fuel economy. The interior offered a relatively high seating position and surprising space for its class, with a 7-inch touchscreen infotainment system added in later models. Model code U200 built on the same platform as the Buick Encore. Despite its modest performance, the first-generation Trax found success as an affordable entry point to Chevrolet's SUV lineup, appealing to first-time buyers and urban dwellers seeking versatility in a compact package."

  - name: "First Generation (2017 Facelift)"
    start_year: 2017
    end_year: 2022
    description: "Chevrolet performed a mid-cycle update on the Trax for the 2017 model year, first unveiled at the 2016 Chicago Auto Show on February 12, 2016, going on sale in fall 2016. The facelift introduced a dramatic styling refresh with design cues from the Malibu and Volt, including new halogen projector headlights, LED daytime running lights, dual taillights, and a new grille design. The interior was comprehensively redesigned with a new dashboard and center instrument panel that improved perceived quality. Still built on the GM Gamma II platform with the same 1.4L turbocharged four-cylinder engine and six-speed automatic transmission, the facelift maintained the same platform while delivering significant visual and technological improvements. The 2017 refresh model continued unchanged through 2022, when it was replaced by the larger second-generation Trax."

  - name: "Second Generation"
    start_year: 2024
    end_year: null
    description: "The completely redesigned second-generation Trax features a dramatic styling transformation with a longer, wider, and lower profile compared to its predecessor. No longer a tall, boxy subcompact SUV, the new Trax adopts sleeker proportions inspired by the larger Blazer, with a coupe-like roofline and more aggressive design elements. Built on GM's VSS-F platform (9CXX), it is classified as a compact rather than subcompact, with significantly increased dimensions providing more passenger and cargo space. Powered by a 1.2L turbocharged three-cylinder engine producing 137 HP, paired with a six-speed automatic transmission, it is available exclusively with front-wheel drive. The interior represents a major advancement with a standard 8-inch (LT and higher trims: 11-inch) touchscreen infotainment system and an 8-inch digital instrument cluster on higher trims. Standard features include wireless Apple CarPlay and Android Auto, with available technology including adaptive cruise control, wireless phone charging, and a sunroof. First introduced in China in July 2022 as the Chevrolet Seeker, the North American version was unveiled in October 2022 with sales beginning in Q2 2023 as a 2024 model. Despite growing in size, the second-generation Trax maintains a value-oriented approach with a starting price lower than many competitors, positioned as an affordable yet stylish and technology-rich alternative to both small SUVs and traditional compact sedans."
